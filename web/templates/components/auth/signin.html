<form
    novalidate
    autocomplete="on"
    hx-ext="response-targets"
    hx-post="/signin"
    hx-target-401="#error"
    class="flex flex-col items-center border border-test rounded-md shadow-lg gap-3 p-4"
>
    <a
        _="on click add .popup-hidden to #popup-window then remove .blur-bg from #main"
        class="absolute top-0 right-1 cursor-pointer"
    >
        <i class="fa-solid fa-xmark hover:text-gray-400"></i>
    </a>

    <input
        type="email"
        name="email"
        id="email"
        required
        placeholder="E-Mail"
        tabindex="1"
        class="input-text focus:outline-none focus:ring-2 focus:ring-blue-500"
    />

    <input
        type="password"
        name="password"
        id="password"
        required
        placeholder="Password"
        tabindex="2"
        class="input-text focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
    <div id="error" class="text-red-600"></div>

    <button
        type="submit"
        tabindex="3"
        class="w-2/3 cursor-pointer rounded-lg border-2 border-black text-white hover:text-black bg-background hover:bg-white transition-colors ease-in-out duration-300"
        _="on htmx:afterOnLoad hide #popup-window"
    >
        Sign In
    </button>

    <ul class="flex gap-x-2">
        <li class="text-black">New here?</li>
        <li>
            <a
                _="on click add .popup-hidden to #popup-window then settle then remove .popup-hidden from #popup-window"
                hx-get="/signup"
                hx-trigger="click"
                hx-target="#popup-window"
                hx-swap="innerHTML swap:0.5s"
                hx-push-url="false"
                class="hover:text-blue-300 text-gray-500 cursor-pointer"
            >
                Register now.
            </a>
        </li>
    </ul>
</form>
