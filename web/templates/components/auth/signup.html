<form
    novalidate
    autocomplete="on"
    hx-ext="response-targets"
    hx-post="/signup"
    hx-target-4*="#error"
    class="flex flex-col items-center border border-test rounded-md shadow-lg gap-3 p-4"
>
    <a
        _="on click add .popup-hidden to #popup-window then remove .blur-bg from #main"
        class="absolute top-0 right-1 cursor-pointer"
    >
        <i class="fa-solid fa-xmark hover:text-gray-400"></i>
    </a>
    <input
        type="email"
        name="email"
        id="email"
        required
        placeholder="E-Mail"
        tabindex="1"
        class="input-text focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
    <input
        type="password"
        name="password"
        id="password"
        required
        placeholder="Password"
        tabindex="2"
        class="input-text focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
    <input
        type="text"
        name="firstname"
        id="firstname"
        required
        placeholder="First Name"
        tabindex="3"
        class="input-text focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
    <input
        type="text"
        name="lastname"
        id="lastname"
        required
        placeholder="Last Name"
        tabindex="4"
        class="input-text focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
    <input
        type="tel"
        name="phone"
        id="phone"
        placeholder="Phonenumber"
        tabindex="5"
        class="input-text focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
    <div id="error" class="text-red-600"></div>
    <button
        type="submit"
        class="w-2/3 cursor-pointer rounded-lg border-2 border-black text-white hover:text-black bg-black hover:bg-white transition-colors ease-in-out duration-300"
    >
        Sign Up
    </button>
    <li class="flex gap-x-2">
        <ul>
            Already have an account?
        </ul>
        <a
            _="on click add .popup-hidden to #popup-window then settle then remove .popup-hidden from #popup-window"
            hx-get="/signin"
            hx-trigger="click"
            hx-target="#popup-window"
            hx-swap="innerHTML swap:0.5s"
            class="hover:text-blue-300 text-gray-500 cursor-pointer"
            >Sign in
        </a>
    </li>
</form>
